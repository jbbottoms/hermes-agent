name: Quinn gateway PR rescue v3

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  rescue:
    if: >-
      github.event.pull_request.title == '[quinn-bootstrap] rescue gateway PR 62931'
      && github.event.pull_request.user.login == 'jbbottoms'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out fork
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Replay the reviewed fix on current upstream main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Jaret Bottoms"
          git config user.email "25535214+jbbottoms@users.noreply.github.com"
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch --no-tags upstream main
          git fetch --no-tags origin fix/profile-gateway-inheritance-label
          git checkout -B fix/profile-gateway-inheritance-label upstream/main
          git cherry-pick b48cc2cfd15ba36b1150bd987f1c38c22cc60185
          git diff --check upstream/main

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Verify and publish refreshed branch
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts >/tmp/npm-ci.log 2>&1 || {
            tail -n 120 /tmp/npm-ci.log
            exit 1
          }
          npm run test:ui --workspace apps/desktop -- \
            src/app/settings/gateway-settings.test.tsx >/tmp/gateway-test.log 2>&1 || {
              tail -n 180 /tmp/gateway-test.log
              exit 1
            }
          npm run typecheck --workspace apps/desktop >/tmp/gateway-typecheck.log 2>&1 || {
            tail -n 180 /tmp/gateway-typecheck.log
            exit 1
          }
          npm run lint --workspace apps/desktop -- \
            src/app/settings/gateway-settings.tsx \
            src/app/settings/gateway-settings.test.tsx \
            src/i18n/en.ts \
            src/i18n/ja.ts \
            src/i18n/types.ts \
            src/i18n/zh-hant.ts \
            src/i18n/zh.ts >/tmp/gateway-lint.log 2>&1 || {
              tail -n 180 /tmp/gateway-lint.log
              exit 1
            }
          git diff --check upstream/main
          git push --force origin HEAD:fix/profile-gateway-inheritance-label

  cleanup:
    if: always() && github.event.pull_request.title == '[quinn-bootstrap] rescue gateway PR 62931'
    needs: [rescue]
    runs-on: ubuntu-latest
    steps:
      - name: Remove one-shot workflow from fork main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - shell: bash
        run: |
          set -euo pipefail
          git config user.name "Jaret Bottoms"
          git config user.email "25535214+jbbottoms@users.noreply.github.com"
          rm -f .github/workflows/quinn-gateway-rescue-v3.yml
          git add -A
          git commit -m "chore: remove one-shot gateway PR rescue"
          git push origin HEAD:main
