name: Quinn PR hunt PR trigger

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  repair:
    if: >-
      github.event.pull_request.title == '[quinn-bootstrap] run hermes PR hunt'
      && github.event.pull_request.user.login == 'jbbottoms'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out fork main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Configure contribution remotes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Jaret Bottoms"
          git config user.email "25535214+jbbottoms@users.noreply.github.com"
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch --no-tags upstream main
          git fetch --no-tags origin \
            fix/search-content-glob-recovery \
            fix/profile-gateway-inheritance-label || true

      - name: Install Python toolchain
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Extract embedded repair lanes
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/quinn-pr-hunt-bootstrap.yml').read_text(encoding='utf-8')
          lines = workflow.splitlines()

          def extract(step_name: str, output: str) -> None:
              marker = f'      - name: {step_name}'
              try:
                  start = lines.index(marker)
              except ValueError as exc:
                  raise SystemExit(f'missing embedded step {step_name!r}') from exc
              run_index = next(
                  index for index in range(start + 1, len(lines))
                  if lines[index] == '        run: |'
              )
              body: list[str] = []
              for line in lines[run_index + 1:]:
                  if not line.strip():
                      body.append('')
                      continue
                  if not line.startswith('          '):
                      break
                  body.append(line[10:])
              if not body:
                  raise SystemExit(f'empty embedded step {step_name!r}')
              Path(output).write_text('\n'.join(body) + '\n', encoding='utf-8')

          extract('Build and verify search glob recovery', '/tmp/quinn-lane-a.sh')
          extract('Port and verify profile gateway inheritance fix', '/tmp/quinn-lane-b.sh')
          PY
          chmod +x /tmp/quinn-lane-a.sh /tmp/quinn-lane-b.sh

      - name: Run search glob recovery lane
        shell: bash
        run: /tmp/quinn-lane-a.sh

      - name: Run profile gateway inheritance lane
        shell: bash
        run: /tmp/quinn-lane-b.sh

      - name: Report run result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" --body "Quinn bootstrap result: **${RESULT}** — ${RUN_URL}"
          gh pr close "${{ github.event.pull_request.number }}"

      - name: Remove one-shot workflows from fork main
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard
          git clean -fdx
          git fetch origin main
          git checkout -B cleanup-main origin/main
          rm -f \
            .github/workflows/quinn-pr-hunt-bootstrap.yml \
            .github/workflows/quinn-pr-hunt-pr-trigger.yml
          if git diff --quiet; then
            exit 0
          fi
          git add -A
          git commit -m "chore: remove one-shot Quinn PR hunt workflows"
          git push origin HEAD:main
