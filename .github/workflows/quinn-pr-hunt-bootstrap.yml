name: Quinn PR hunt bootstrap

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  repair:
    if: >-
      github.event.issue.title == '[quinn-bootstrap] hermes-pr-hunt-2026-07-17'
      && github.event.issue.user.login == 'jbbottoms'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out fork
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure contribution remotes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Jaret Bottoms"
          git config user.email "25535214+jbbottoms@users.noreply.github.com"
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch --no-tags upstream main
          git fetch --no-tags origin \
            fix/search-content-glob-recovery \
            fix/profile-gateway-inheritance-label || true

      - name: Install Python toolchain
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Build and verify search glob recovery
        shell: bash
        run: |
          set -euo pipefail
          git checkout -B fix/search-content-glob-recovery upstream/main
          python3 <<'PY'
          from pathlib import Path

          source_path = Path("tools/file_operations.py")
          source = source_path.read_text(encoding="utf-8")

          marker = '_REGEX_NEWLINE_ESCAPE_RE = re.compile(r"(?<!\\\\)(?:\\\\\\\\)*\\\\n")'
          if source.count(marker) != 1:
              raise SystemExit(f"expected one helper insertion marker, found {source.count(marker)}")
          if "def _globish_content_pattern_to_regex(" in source:
              raise SystemExit("glob recovery helpers already present")

          helpers = r'''_GLOBISH_CONTENT_REGEX_META_RE = re.compile(r"[\[\]{}()|+^$\\\r\n]")
          _REGEX_SYNTAX_ERROR_MARKERS = (
              "regex parse error",
              "invalid regular expression",
              "repetition operator missing expression",
              "unclosed character class",
              "nothing to repeat",
          )


          def _globish_content_pattern_to_regex(pattern: str) -> Optional[str]:
              """Translate a clearly glob-shaped invalid content pattern once.

              Content search accepts regular expressions, but smaller/local models
              sometimes pass filename-glob syntax such as ``*foo*bar*``. Only
              translate after Python's regex parser rejects the original pattern,
              and only when the remaining text contains glob wildcards without any
              other regex-only metacharacters. This keeps valid regex semantics
              byte-for-byte unchanged and avoids guessing at ambiguous patterns.
              """
              candidate = pattern.strip()
              if candidate.startswith("(?:") and candidate.endswith(")"):
                  candidate = candidate[3:-1]
              if not candidate or not any(char in candidate for char in "*?"):
                  return None
              if _GLOBISH_CONTENT_REGEX_META_RE.search(candidate):
                  return None
              return re.escape(candidate).replace(r"\*", ".*").replace(r"\?", ".")


          def _normalize_content_search_pattern(pattern: str) -> tuple[str, Optional[str]]:
              """Return a valid content regex plus an optional recovery warning."""
              try:
                  re.compile(pattern)
              except re.error:
                  translated = _globish_content_pattern_to_regex(pattern)
                  if translated is not None:
                      return translated, (
                          "The supplied content-search pattern was not a valid regular "
                          f"expression and was interpreted as the glob-like pattern {pattern!r} "
                          f"(translated regex: {translated!r}). Use target='files' when "
                          "matching file names with globs."
                      )
              return pattern, None


          def _looks_like_regex_syntax_error(error: Optional[str]) -> bool:
              """Return True when a search failure is specifically regex syntax."""
              lowered = (error or "").lower()
              return any(marker in lowered for marker in _REGEX_SYNTAX_ERROR_MARKERS)


          '''
          source = source.replace(marker, helpers + marker, 1)

          doc_anchor = (
              '        """Search for content inside files (grep-like)."""\n'
              '        # Try ripgrep first (fast), fallback to grep (slower but works)'
          )
          doc_replacement = (
              '        """Search for content inside files (grep-like)."""\n'
              '        normalized_pattern, pattern_warning = _normalize_content_search_pattern(pattern)\n\n'
              '        # Try ripgrep first (fast), fallback to grep (slower but works)'
          )
          if source.count(doc_anchor) != 1:
              raise SystemExit(f"expected one search-content anchor, found {source.count(doc_anchor)}")
          source = source.replace(doc_anchor, doc_replacement, 1)

          rg_call = (
              "            result = self._search_with_rg(pattern, path, file_glob, limit, offset,\n"
              "                                          output_mode, context)"
          )
          rg_replacement = (
              "            result = self._search_with_rg(normalized_pattern, path, file_glob, limit, offset,\n"
              "                                          output_mode, context)"
          )
          if source.count(rg_call) != 1:
              raise SystemExit(f"expected one rg call, found {source.count(rg_call)}")
          source = source.replace(rg_call, rg_replacement, 1)

          grep_call = (
              "            result = self._search_with_grep(pattern, path, file_glob, limit, offset,\n"
              "                                            output_mode, context)"
          )
          grep_replacement = (
              "            result = self._search_with_grep(normalized_pattern, path, file_glob, limit, offset,\n"
              "                                            output_mode, context)"
          )
          if source.count(grep_call) != 1:
              raise SystemExit(f"expected one grep call, found {source.count(grep_call)}")
          source = source.replace(grep_call, grep_replacement, 1)

          return_line = "        return _maybe_warn_line_oriented_newline_pattern(result, pattern)"
          return_replacement = '''        result = _maybe_warn_line_oriented_newline_pattern(
              result, normalized_pattern
          )
          if pattern_warning and not result.error:
              result.warning = (
                  f"{pattern_warning} {result.warning}"
                  if result.warning
                  else pattern_warning
              )
          elif result.error and _looks_like_regex_syntax_error(result.error):
              result.error = (
                  f"{result.error} Content search expects a regular expression. "
                  "Use target='files' when matching file names with globs."
              )
          return result'''
          if source.count(return_line) != 1:
              raise SystemExit(f"expected one search-content return, found {source.count(return_line)}")
          source = source.replace(return_line, return_replacement, 1)
          source_path.write_text(source, encoding="utf-8")

          test_path = Path("tests/tools/test_search_glob_pattern_recovery.py")
          if test_path.exists():
              raise SystemExit(f"refusing to overwrite existing {test_path}")
          test_path.write_text(
              '''"""Regression coverage for glob-shaped content-search patterns (#66129)."""

          from tools.file_operations import (
              SearchMatch,
              SearchResult,
              ShellFileOperations,
              _globish_content_pattern_to_regex,
          )


          def _drive_content_search(pattern: str, backend_result: SearchResult | None = None):
              ops = ShellFileOperations.__new__(ShellFileOperations)
              seen: list[str] = []

              ops._has_command = lambda command: command == "rg"

              def fake_rg(search_pattern, path, file_glob, limit, offset, output_mode, context):
                  seen.append(search_pattern)
                  return backend_result or SearchResult(
                      matches=[SearchMatch(path="sample.txt", line_number=1, content="detector scheduler")],
                      total_count=1,
                  )

              ops._search_with_rg = fake_rg
              result = ops._search_content(pattern, ".", None, 50, 0, "content", 0)
              return result, seen


          def test_bare_glob_pattern_is_translated_once():
              result, seen = _drive_content_search("*detector*scheduler*")

              assert seen == [r".*detector.*scheduler.*"]
              assert result.error is None
              assert result.total_count == 1
              assert result.warning is not None
              assert "interpreted as the glob-like pattern" in result.warning
              assert "target='files'" in result.warning


          def test_noncapturing_wrapper_around_glob_is_recovered():
              result, seen = _drive_content_search("(?:*detector*scheduler*)")

              assert seen == [r".*detector.*scheduler.*"]
              assert result.error is None
              assert result.warning is not None


          def test_valid_regex_is_never_rewritten():
              result, seen = _drive_content_search(r"detector.*scheduler")

              assert seen == [r"detector.*scheduler"]
              assert result.error is None
              assert result.warning is None


          def test_invalid_non_glob_regex_keeps_error_and_adds_guidance():
              backend_error = SearchResult(
                  error="Search failed: rg: regex parse error: unclosed character class",
                  total_count=0,
              )
              result, seen = _drive_content_search("[", backend_error)

              assert seen == ["["]
              assert result.error is not None
              assert "Content search expects a regular expression" in result.error
              assert "target='files'" in result.error
              assert result.warning is None


          def test_translation_rejects_regex_intent_and_plain_text():
              assert _globish_content_pattern_to_regex(r"\d+") is None
              assert _globish_content_pattern_to_regex("foo[bar]") is None
              assert _globish_content_pattern_to_regex("plain text") is None
          ''',
              encoding="utf-8",
          )
          PY
          rm -f .github/workflows/apply-search-content-glob-recovery.yml
          uv python install 3.11
          uv sync --locked --python 3.11 --extra all --extra dev
          source .venv/bin/activate
          python -m pytest \
            tests/tools/test_search_glob_pattern_recovery.py \
            tests/tools/test_search_error_guard.py \
            -q
          python -m py_compile tools/file_operations.py
          ruff check tools/file_operations.py tests/tools/test_search_glob_pattern_recovery.py
          git diff --check
          git add -A
          git commit -m "fix(files): recover glob-shaped content searches"
          git push --force origin HEAD:fix/search-content-glob-recovery

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Port and verify profile gateway inheritance fix
        shell: bash
        run: |
          set -euo pipefail
          deactivate || true
          git reset --hard
          git clean -fdx
          git checkout -B fix/profile-gateway-inheritance-label upstream/main
          python3 <<'PY'
          from pathlib import Path

          gateway_path = Path("apps/desktop/src/app/settings/gateway-settings.tsx")
          gateway = gateway_path.read_text(encoding="utf-8")

          saved_anchor = '''export function savedCloudConnectionUrl(config: Pick<GatewaySettingsState, 'mode' | 'remoteUrl'>): string {
            return config.mode === 'cloud' ? config.remoteUrl.trim().replace(/\/+$/, '').toLowerCase() : ''
          }
          '''
          helper = saved_anchor + '''
          export function localGatewayCopy(
            scope: string | null,
            copy: { localTitle: string; localDesc: string; inheritTitle: string; inheritDesc: string }
          ): { title: string; description: string } {
            return scope === null
              ? { title: copy.localTitle, description: copy.localDesc }
              : { title: copy.inheritTitle, description: copy.inheritDesc }
          }
          '''
          if gateway.count(saved_anchor) != 1:
              raise SystemExit(f"expected one savedCloudConnectionUrl anchor, found {gateway.count(saved_anchor)}")
          gateway = gateway.replace(saved_anchor, helper, 1)

          return_anchor = '''  if (!window.hermesDesktop?.getConnectionConfig) {
            return <EmptyState description={g.unavailableDesc} title={g.unavailableTitle} />
          }

          return (
          '''
          return_replacement = '''  if (!window.hermesDesktop?.getConnectionConfig) {
            return <EmptyState description={g.unavailableDesc} title={g.unavailableTitle} />
          }

          const localModeCopy = localGatewayCopy(scope, g)

          return (
          '''
          if gateway.count(return_anchor) != 1:
              raise SystemExit(f"expected one render anchor, found {gateway.count(return_anchor)}")
          gateway = gateway.replace(return_anchor, return_replacement, 1)

          replacements = {
              '            description={g.localDesc}': '            description={localModeCopy.description}',
              '            title={g.localTitle}': '            title={localModeCopy.title}',
          }
          for old, new in replacements.items():
              if gateway.count(old) != 1:
                  raise SystemExit(f"expected one gateway mode anchor {old!r}, found {gateway.count(old)}")
              gateway = gateway.replace(old, new, 1)
          gateway_path.write_text(gateway, encoding="utf-8")

          locale_replacements = {
              "apps/desktop/src/i18n/en.ts": [
                  (
                      '        `Connection used only when “${profile}” is the active profile. Set it to Local to inherit the default.`,',
                      '        `Connection used only when “${profile}” is the active profile. Choose Use default gateway to remove its override.`,',
                  ),
                  (
                      "      localDesc: 'Start a private Hermes backend on localhost. This is the default and works offline.',",
                      "      localDesc: 'Start a private Hermes backend on localhost. This is the default and works offline.',\n"
                      "      inheritTitle: 'Use default gateway',\n"
                      "      inheritDesc: \"Remove this profile's override and use the default connection.\",",
                  ),
              ],
              "apps/desktop/src/i18n/ja.ts": [
                  (
                      '        `"${profile}" がアクティブプロファイルのときのみ使用される接続。ローカルに設定するとデフォルトを継承します。`,',
                      '        `"${profile}" がアクティブプロファイルのときのみ使用される接続。「デフォルトゲートウェイを使用」を選ぶとオーバーライドが削除されます。`,',
                  ),
                  (
                      "      localDesc:\n        'ローカルホストでプライベートな Hermes バックエンドを起動します。これがデフォルトで、オフラインでも動作します。',",
                      "      localDesc:\n        'ローカルホストでプライベートな Hermes バックエンドを起動します。これがデフォルトで、オフラインでも動作します。',\n"
                      "      inheritTitle: 'デフォルトゲートウェイを使用',\n"
                      "      inheritDesc: 'このプロファイルのオーバーライドを削除し、デフォルト接続を使用します。',",
                  ),
              ],
              "apps/desktop/src/i18n/zh-hant.ts": [
                  (
                      '      profileConnection: profile => `僅當「${profile}」為作用中設定檔時使用此連線。設為本機可繼承預設連線。`,',
                      '      profileConnection: profile => `僅當「${profile}」為作用中設定檔時使用此連線。選擇「使用預設閘道」可移除其覆寫。`,',
                  ),
                  (
                      "      localDesc: '在 localhost 啟動私有 Hermes 後端。這是預設方式，可離線使用。',",
                      "      localDesc: '在 localhost 啟動私有 Hermes 後端。這是預設方式，可離線使用。',\n"
                      "      inheritTitle: '使用預設閘道',\n"
                      "      inheritDesc: '移除此設定檔的自訂覆寫並使用預設連線。',",
                  ),
              ],
              "apps/desktop/src/i18n/zh.ts": [
                  (
                      '      profileConnection: profile => `仅当“${profile}”是当前 profile 时使用此连接。设为本地即可继承默认连接。`,',
                      '      profileConnection: profile => `仅当“${profile}”是当前 profile 时使用此连接。选择“使用默认网关”可移除其覆盖。`,',
                  ),
                  (
                      "      localDesc: '在 localhost 启动私有 Hermes 后端。这是默认方式，并且可离线工作。',",
                      "      localDesc: '在 localhost 启动私有 Hermes 后端。这是默认方式，并且可离线工作。',\n"
                      "      inheritTitle: '使用默认网关',\n"
                      "      inheritDesc: '移除此 profile 的自定义覆盖并使用默认连接。',",
                  ),
              ],
          }
          for filename, replacements in locale_replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              for old, new in replacements:
                  if text.count(old) != 1:
                      raise SystemExit(f"expected one locale anchor in {filename}: {old!r}; found {text.count(old)}")
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8")

          types_path = Path("apps/desktop/src/i18n/types.ts")
          types_text = types_path.read_text(encoding="utf-8")
          types_anchor = '''      localTitle: string
                localDesc: string
                remoteTitle: string'''
          types_replacement = '''      localTitle: string
                localDesc: string
                inheritTitle: string
                inheritDesc: string
                remoteTitle: string'''
          if types_text.count(types_anchor) != 1:
              raise SystemExit(f"expected one translation type anchor, found {types_text.count(types_anchor)}")
          types_path.write_text(types_text.replace(types_anchor, types_replacement, 1), encoding="utf-8")

          test_path = Path("apps/desktop/src/app/settings/gateway-settings.test.ts")
          test = test_path.read_text(encoding="utf-8")
          import_anchor = "import { savedCloudConnectionUrl } from './gateway-settings'"
          if test.count(import_anchor) != 1:
              raise SystemExit(f"expected one test import anchor, found {test.count(import_anchor)}")
          test = test.replace(
              import_anchor,
              "import { localGatewayCopy, savedCloudConnectionUrl } from './gateway-settings'",
              1,
          )
          test += '''

          describe('localGatewayCopy', () => {
            const copy = {
              localTitle: 'Local gateway',
              localDesc: 'Start a private local backend.',
              inheritTitle: 'Use default gateway',
              inheritDesc: "Remove this profile's override and use the default connection."
            }

            it('keeps local gateway copy for the global scope', () => {
              expect(localGatewayCopy(null, copy)).toEqual({
                title: 'Local gateway',
                description: 'Start a private local backend.'
              })
            })

            it('uses inheritance copy for a named profile', () => {
              expect(localGatewayCopy('work', copy)).toEqual({
                title: 'Use default gateway',
                description: "Remove this profile's override and use the default connection."
              })
            })
          })
          '''
          test_path.write_text(test, encoding="utf-8")
          PY
          rm -f .github/workflows/rebase-profile-gateway-inheritance.yml
          npm ci --ignore-scripts
          npm run test:ui --workspace apps/desktop -- src/app/settings/gateway-settings.test.ts
          npm run typecheck --workspace apps/desktop
          npm run lint --workspace apps/desktop -- \
            src/app/settings/gateway-settings.tsx \
            src/app/settings/gateway-settings.test.ts \
            src/i18n/en.ts \
            src/i18n/ja.ts \
            src/i18n/types.ts \
            src/i18n/zh-hant.ts \
            src/i18n/zh.ts
          git diff --check
          git add -A
          git commit -m "fix(desktop): clarify inherited profile gateway"
          git push --force origin HEAD:fix/profile-gateway-inheritance-label

      - name: Report run result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "Quinn bootstrap result: **${RESULT}** — ${RUN_URL}"
          if [ "${RESULT}" = "success" ]; then
            gh issue close "${{ github.event.issue.number }}" --reason completed
          fi

      - name: Remove one-shot workflow from fork main
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard
          git clean -fdx
          git fetch origin main
          git checkout -B cleanup-main origin/main
          rm -f .github/workflows/quinn-pr-hunt-bootstrap.yml
          if git diff --quiet; then
            exit 0
          fi
          git add -A
          git commit -m "chore: remove one-shot Quinn PR hunt bootstrap"
          git push origin HEAD:main
